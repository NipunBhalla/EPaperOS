; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Default to the LilyGo T5 4.7" S3 ESP-IDF environment (the D2 target board)
default_envs = lilygo_t5s3_idf

[common]
; Pin to IDF 5.1.2: fork predates IDF 6 (needs legacy driver/adc.h, and
; platform 7.x injects a C++-only flag into C compiles under -Werror).
platform = espressif32@6.5.0
framework = espidf
board = esp32dev
;upload_port = /dev/cu.SLAB_USBtoUART 
;monitor_port = /dev/cu.SLAB_USBtoUART
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps =
  https://github.com/zeux/pugixml.git
build_flags =
  ; maximim speed
  -Ofast
  ; needed to stop the png library tying to pull in Arduino.h
  -D__MCUXPRESSO
  ; device has PRSRAM
  ; and should be used for ram intensive display work
  -DBOARD_HAS_PSRAM
  ; Logging. Leave enabled for first builds and debugging. Comment to disable
  -D LOG_ENABLED
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES
 

[esp32_common]
platform = ${common.platform}
framework = ${common.framework}
board = ${common.board}
;upload_port = ${common.upload_port}
;monitor_port = ${common.monitor_port}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags = ${common.build_flags}
lib_deps = ${common.lib_deps}
board_build.partitions = partitions.csv



[env:native]
platform = native
test_build_src = false
targets = test
# enable C++11 extensions
build_flags =
  -std=c++11
  -D__MCUXPRESSO
lib_deps =
  https://github.com/leethomason/tinyxml2.git
lib_ignore = 
  touch
  epdiy
  sd_card
  spiffs
  FT6X36
  m5Paper
debug_test = *

[env:paper_s3_idf]
extends = esp32_common
board = esp32-s3-devkitm-1
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_unflags =
  -Ofast
build_flags =
  ${common.build_flags}
  -Os
  ; ESP32-S3 PaperS3 board using epdiy renderer
  -DBOARD_TYPE_PAPER_S3
  ; Enable ADC-based battery monitoring on Paper S3. VBAT is routed
  ; through a 2:1 divider to GPIO3, which corresponds to ADC1 channel 2
  ; (same mapping used by BatteryPaperS3::read_voltage in epub-papers3).
  -DBATTERY_ADC_CHANNEL=ADC1_CHANNEL_2
  ; use ED047TC2 960x540 display config from epdiy for now
  -DCONFIG_EPD_DISPLAY_TYPE_ED047TC2
  -DCONFIG_EPD_BOARD_REVISION_LILYGO_T5_47
  -Ilib_freetype/include/freetype2
  -Llib_freetype/lib
  -lfreetype
  -DUSE_FREETYPE
  -DUSE_PUGIXML
  -DPUGIXML_NO_EXCEPTIONS
  -DUSE_PNGLE
  -Ilib/pngle/src
  ; use SD card for EPUB storage on PaperS3 (no SPIFFS). Board::start_filesystem()
  ; mounts an SD card at /fs using the SD_CARD_PIN_NUM_* pins below.
  -DSD_CARD_PIN_NUM_MISO=GPIO_NUM_40
  -DSD_CARD_PIN_NUM_MOSI=GPIO_NUM_38
  -DSD_CARD_PIN_NUM_CLK=GPIO_NUM_39
  -DSD_CARD_PIN_NUM_CS=GPIO_NUM_47
lib_deps =
  ${common.lib_deps}
lib_ignore =
  epdiy
  touch
  FT6X36
  m5Paper
lib_extra_dirs = lib_freetype/lib
lib_archive =
  yes
lib_compat_mode = soft
lib_ldf_mode = chain

; ---------------------------------------------------------------------------
; LilyGo T5 4.7" S3 PRO / Pro Lite (D2 target). Confirmed by hardware check:
; frontlight + touch -> Pro, NOT the standard V2.3. EPD is driven via the
; in-repo epdiy board def components/epdiy/src/board/lilygo_board_s3.c
; (PCA9555 IO-expander + TPS65185 PMIC over I2C SDA=39/SCL=40; LCD_CAM data
; 5,6,7,15,16,17,18,8; CKV48 STH41 LEH42 STV45 CKH4). Selected via
; -DUSE_LILYGO_S3_BOARD below (renderer calls epd_set_board(&lilygo_board_s3)).
; Pin map authoritative source = T5S3-4.7-e-paper-PRO docs/pin_define.md:
;   SD(SPI) MISO=21 MOSI=13 SCLK=14 CS=12 (free vs EPD; shared w/ LoRa on full
;     Pro but Pro Lite has no LoRa). Touch GT911 SDA=39 SCL=40 INT=3 RST=9.
;   Frontlight BL_EN=11. PCA9535 INT=38.
; GT911 INT was a placeholder (48); corrected to 3. Touch still deferred (D2 step 8).
; ---------------------------------------------------------------------------
[env:lilygo_t5s3_idf]
extends = esp32_common
board = esp32-s3-devkitm-1
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
; QIO = 4-bit flash reads, ~2x XIP bandwidth for flash-resident code (FreeType,
; parser). If the board ever boot-loops on flash init, revert to dio.
board_build.flash_mode = qio
board_build.use_response_file = yes
; Explicitly pull configuration maps from our base overrides file
board_build.esp_idf.sdkconfig_defaults = sdkconfig.defaults
board_build.esp_idf.sdkconfig_options =
    CONFIG_ULP_COPROC_ENABLED=n
    CONFIG_SPIRAM_SUPPORT=y
    CONFIG_SPIRAM_TYPE_AUTO=y
    CONFIG_SPIRAM_MODE_OCT=y
    ; 80M: IDF 5.1.2 second-stage bootloader handles MSPI timing state on warm
    ; reset (rst:0xc). FETCH_INSTRUCTIONS+RODATA also set in sdkconfig as belt-
    ; and-suspenders. If warm-reset boot-loops appear, revert to 40M here and
    ; in sdkconfig.lilygo_t5s3_idf.
    CONFIG_SPIRAM_SPEED_80M=y
    CONFIG_COMPILER_OPTIMIZATION_PERF=y
build_unflags =
  -Ofast
  -Os
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES
build_flags =
  ${common.build_flags}
  -O2
  -Wno-error
  -DBOARD_TYPE_PAPER_S3
  -DUSE_LILYGO_S3_BOARD
  ; No -DBATTERY_ADC_CHANNEL: the S3 Pro has no analog VBAT divider. Battery is
  ; read from the BQ25896 PMIC over I2C (see PaperS3::get_battery + BQ25896Battery).
  ; The old ADC1_CHANNEL_2 (GPIO3) was an M5 leftover that read 0 and clashed
  ; with GT911_INT=3.
  -DCONFIG_EPD_DISPLAY_TYPE_ED047TC2
  -DCONFIG_EPD_BOARD_REVISION_LILYGO_T5_47
  -Ilib_freetype/include/freetype2
  -Llib_freetype/lib
  -lfreetype
  -DUSE_FREETYPE
  -DUSE_PUGIXML
  -DPUGIXML_NO_EXCEPTIONS
  -DUSE_PNGLE
  -Ilib/pngle/src
  -DGT911_SDA_GPIO=GPIO_NUM_39
  -DGT911_SCL_GPIO=GPIO_NUM_40
  -DGT911_INT_GPIO=GPIO_NUM_3
  -DGT911_RST_GPIO=GPIO_NUM_9
  -DSD_CARD_PIN_NUM_MISO=GPIO_NUM_21
  -DSD_CARD_PIN_NUM_MOSI=GPIO_NUM_13
  -DSD_CARD_PIN_NUM_CLK=GPIO_NUM_14
  -DSD_CARD_PIN_NUM_CS=GPIO_NUM_12
; Full EPaperOS firmware: build the Tasks app + WiFi. This single switch drives
; both the CMake source selection (src/tasks/) and the #ifdef EPAPEROS_TASKS
; code paths. Obsidian/WiFi credentials are NOT here -- they come from
; src/tasks/TasksConfig.local.h (gitignored) or NVS at runtime.
board_build.cmake_extra_args =
    -DEPAPEROS_TASKS=ON
upload_port = COM9
monitor_port = COM9
monitor_speed = 115200
lib_deps =
  ${common.lib_deps}
lib_ignore =
  epdiy
  touch
  FT6X36
  m5Paper
lib_extra_dirs = lib_freetype/lib
lib_archive = yes
lib_compat_mode = soft
lib_ldf_mode = chain

; ---------------------------------------------------------------------------
; Pure EPUB reader variant of lilygo_t5s3_idf: no Tasks app, no WiFi/HTTP.
; Boots straight into the library (no home menu). The ONLY intended difference
; from lilygo_t5s3_idf is the absence of the EPAPEROS_TASKS cmake flag, so
; src/CMakeLists.txt excludes src/tasks/ + the WiFi components.
;
; Spelled out in full on purpose: PlatformIO `extends` does NOT propagate
; board_build.esp_idf.sdkconfig_options to a child env, which silently dropped
; PSRAM (CONFIG_SPIRAM) and crashed epd_hl_init at boot. Keep board / sdkconfig
; / build_flags here in sync with lilygo_t5s3_idf above.
; ---------------------------------------------------------------------------
[env:lilygo_t5s3_reader]
extends = esp32_common
board = esp32-s3-devkitm-1
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.flash_mode = qio
board_build.use_response_file = yes
; Use a committed per-env sdkconfig (sdkconfig.lilygo_t5s3_reader, a copy of the
; full env's proven config) instead of relying on generated defaults. PlatformIO
; would NOT seed PSRAM (CONFIG_SPIRAM) from sdkconfig_options/defaults here, which
; crashed epd_hl_init at boot. Committing the file directly is the same mechanism
; the full env uses. Keep it in sync with sdkconfig.lilygo_t5s3_idf.
board_build.esp_idf.sdkconfig_defaults = sdkconfig.defaults
build_unflags =
  -Ofast
  -Os
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES
build_flags =
  ${common.build_flags}
  -O2
  -Wno-error
  -DBOARD_TYPE_PAPER_S3
  -DUSE_LILYGO_S3_BOARD
  -DCONFIG_EPD_DISPLAY_TYPE_ED047TC2
  -DCONFIG_EPD_BOARD_REVISION_LILYGO_T5_47
  -Ilib_freetype/include/freetype2
  -Llib_freetype/lib
  -lfreetype
  -DUSE_FREETYPE
  -DUSE_PUGIXML
  -DPUGIXML_NO_EXCEPTIONS
  -DUSE_PNGLE
  -Ilib/pngle/src
  -DGT911_SDA_GPIO=GPIO_NUM_39
  -DGT911_SCL_GPIO=GPIO_NUM_40
  -DGT911_INT_GPIO=GPIO_NUM_3
  -DGT911_RST_GPIO=GPIO_NUM_9
  -DSD_CARD_PIN_NUM_MISO=GPIO_NUM_21
  -DSD_CARD_PIN_NUM_MOSI=GPIO_NUM_13
  -DSD_CARD_PIN_NUM_CLK=GPIO_NUM_14
  -DSD_CARD_PIN_NUM_CS=GPIO_NUM_12
; (no board_build.cmake_extra_args -> EPAPEROS_TASKS undefined -> pure reader)
upload_port = COM9
monitor_port = COM9
monitor_speed = 115200
lib_deps =
  ${common.lib_deps}
lib_ignore =
  epdiy
  touch
  FT6X36
  m5Paper
lib_extra_dirs = lib_freetype/lib
lib_archive = yes
lib_compat_mode = soft
lib_ldf_mode = chain

[env:paper_s3_release]
extends = esp32_common
board = esp32-s3-devkitm-1
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
build_unflags =
  -Ofast
  -D LOG_ENABLED
build_flags =
  ${common.build_flags}
  -Os
  -DBOARD_TYPE_PAPER_S3
  ; Enable ADC-based battery monitoring on Paper S3 (GPIO3 = ADC1_CHANNEL_2
  ; with a 2:1 VBAT divider), matching the epub-papers3 helper.
  -DBATTERY_ADC_CHANNEL=ADC1_CHANNEL_2
  -DCONFIG_EPD_DISPLAY_TYPE_ED047TC2
  -DCONFIG_EPD_BOARD_REVISION_LILYGO_T5_47
  -Ilib_freetype/include/freetype2
  -Llib_freetype/lib
  -lfreetype
  -DUSE_FREETYPE
  -DUSE_PUGIXML
  -DPUGIXML_NO_EXCEPTIONS
  -DUSE_PNGLE
  -Ilib/pngle/src
  -DSD_CARD_PIN_NUM_MISO=GPIO_NUM_40
  -DSD_CARD_PIN_NUM_MOSI=GPIO_NUM_38
  -DSD_CARD_PIN_NUM_CLK=GPIO_NUM_39
  -DSD_CARD_PIN_NUM_CS=GPIO_NUM_47
lib_deps =
  ${common.lib_deps}
lib_ignore =
  epdiy
  touch
  FT6X36
  m5Paper
lib_extra_dirs = lib_freetype/lib
lib_archive =
  yes
lib_compat_mode = soft
lib_ldf_mode = chain